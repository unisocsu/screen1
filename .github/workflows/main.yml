name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    # השלב הזה מייצר את כל קבצי ה-Gradle החסרים בצורה תקינה
    - name: Fix Gradle Environment
      run: |
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    # הרצת הבנייה עם הגדרה מפורשת של ה-Repository
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Prepare File for NetFree Bypass
      run: |
        mkdir -p build_output
        cp app/build/outputs/apk/debug/app-debug.apk build_output/screentool.png

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: project-image-assets
        path: build_output/screentool.png
